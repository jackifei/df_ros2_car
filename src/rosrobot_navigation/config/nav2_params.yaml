# ============================================================
# Nav2 全栈导航统一参数文件（修正版）
# 适用于 ROS2 Jazzy
# 使用方式：在 launch 中通过 parameters=[nav2_params.yaml] 加载
# ============================================================

# --- Map Server ---
# 负责从 YAML+PGM 文件加载并发布占用栅格地图 (/map)
map_server:
  ros__parameters:
    use_sim_time: false          # 是否使用仿真时间（Gazebo 中设为 true）
    yaml_filename: ""            # 地图描述文件的绝对路径，通常由 launch 动态传入
    frame_id: "map"              # 地图的坐标系名称
    topic_name: "map"            # 发布地图的话题名称
    # 注意：map_server 没有 published_frequency 和 allow_unknown 参数，已删除

# --- AMCL (自适应蒙特卡洛定位) ---
# 根据激光雷达和里程计估计机器人在 map 坐标系下的位姿
amcl:
  ros__parameters:
    use_sim_time: false

    # ----- 运动模型参数 -----
    alpha1: 0.2                  # 旋转分量中的角度噪声标准差
    alpha2: 0.2                  # 平移分量中的角度噪声标准差
    alpha3: 0.2                  # 旋转分量中的平移噪声标准差
    alpha4: 0.2                  # 平移分量中的平移噪声标准差
    alpha5: 0.2                  # 额外的平移噪声（用于差速模型）

    # ----- 坐标系 -----
    base_frame_id: "base_footprint"   # 机器人基座坐标系
    global_frame_id: "map"            # 全局坐标系（即地图坐标系）

    # ----- 激光雷达模型参数 -----
    lambda_short: 0.1            # 短距离测量指数分布衰减系数
    laser_likelihood_max_dist: 2.0    # 似然场最大距离（米），超出此距离认为不可能
    laser_max_range: 100.0       # 激光雷达最大有效量程（米）
    laser_min_range: -1.0        # 最小有效量程（负值表示不限制）
    max_beams: 60                # 每次更新使用的最大光束数量
    sigma_hit: 0.2               # 击中概率的高斯标准差
    z_hit: 0.95                  # 击中概率的权重
    z_max: 0.05                  # 最大距离测量的权重
    z_rand: 0.5                  # 随机测量的权重
    z_short: 0.05                # 短距离测量的权重

    # ----- 粒子滤波器参数 -----
    min_particles: 500           # 最小粒子数
    max_particles: 2000          # 最大粒子数
    pf_err: 0.01                 # 粒子滤波器误差容忍度
    pf_z: 0.99                   # 粒子滤波器贝叶斯因子
    recovery_alpha_slow: 0.001   # 缓慢恢复的指数衰减系数
    recovery_alpha_fast: 0.1     # 快速恢复的指数衰减系数
    resample_interval: 1         # 每多少帧重采样一次
    save_pose_rate: 0.5          # 保存位姿到磁盘的频率（Hz）

    # ----- 机器人模型 -----
    robot_model_type: "differential"  # 机器人运动模型：differential / omnidirectional

    # ----- TF 广播 -----
    tf_broadcast: true           # 是否广播 map -> odom 变换
    transform_tolerance: 1.0     # 变换允许的最大延迟（秒）

    # ----- 更新条件 -----
    update_min_a: 0.2            # 触发更新的最小旋转角度变化（弧度）
    update_min_d: 0.25           # 触发更新的最小位移变化（米）

    # ----- 初始位姿 -----
    set_initial_pose: true       # 是否设置初始位姿
    initial_pose_x: 0.0          # 初始 x 坐标（米）
    initial_pose_y: 0.0          # 初始 y 坐标（米）
    initial_pose_yaw: 0.0        # 初始朝向角（弧度）
    # 注意：initial_pose_z 已删除（2D 定位不需要）

# --- Planner (全局路径规划) ---
# 使用 NavFn 算法计算从起点到终点的全局路径
planner:
  ros__parameters:
    use_sim_time: false
    tolerance: 0.5               # 到达目标点的容忍距离（米）
    use_astar: false             # 是否使用 A* 算法（false 使用 Dijkstra）
    allow_unknown: true          # 是否允许路径经过未知区域
    planner_plugin: "nav2_navfn_planner/NavfnPlanner"  # 规划器插件名称

# --- Controller (局部路径跟踪) ---
# 使用 Regulated Pure Pursuit 算法跟踪全局路径，输出速度指令
controller:
  ros__parameters:
    use_sim_time: false
    desired_linear_vel: 0.26     # 期望线速度（m/s）
    max_linear_accel: 2.5        # 最大线加速度（m/s²）
    max_linear_decel: 2.5        # 最大线减速度（m/s²）
    lookahead_dist: 1.0          # 预瞄距离（米）
    min_lookahead_dist: 0.7      # 最小预瞄距离（米）
    max_lookahead_dist: 1.5      # 最大预瞄距离（米）
    use_velocity_scaled_lookahead_dist: false  # 是否根据速度缩放预瞄距离
    rotate_to_heading_angular_vel: 1.8  # 原地旋转时的角速度（rad/s）
    transform_tolerance: 0.1     # 变换容忍时间（秒）
    use_collision_detection: true       # 是否启用碰撞检测
    collision_check_distance: 0.9       # 碰撞检测的前向扫描距离（米）
    # 注意：删除了非标准参数 costmap_topic 和 footprint_topic

# --- Lifecycle Manager ---
# 统一管理上述所有节点的生命周期（configure → activate）
lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true              # 启动后自动依次激活所有节点
    bond_timeout: 0.0            # 连接超时时间（0 表示无限等待）
    node_names:                  # 需要管理的节点名称列表（必须与实际启动的节点一致）
      - map_server
#      - amcl
#      - planner
#      - controller